<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Base metal floor -->
  <rect width="256" height="256" fill="#3a4a5a"/>
  <!-- Large metal plates (3×3 grid of ~85px plates) -->
  <rect x="2"   y="2"   width="81" height="81" fill="#384858" rx="1"/>
  <rect x="87"  y="2"   width="81" height="81" fill="#3c4c5c" rx="1"/>
  <rect x="172" y="2"   width="82" height="81" fill="#404e60" rx="1"/>
  <rect x="2"   y="87"  width="81" height="81" fill="#3c4c5c" rx="1"/>
  <rect x="87"  y="87"  width="81" height="81" fill="#404e60" rx="1"/>
  <rect x="172" y="87"  width="82" height="81" fill="#384858" rx="1"/>
  <rect x="2"   y="172" width="81" height="82" fill="#404e60" rx="1"/>
  <rect x="87"  y="172" width="81" height="82" fill="#384858" rx="1"/>
  <rect x="172" y="172" width="82" height="82" fill="#3c4c5c" rx="1"/>
  <!-- Inner panel detail (slightly lighter inset rect per plate) -->
  <rect x="8"   y="8"   width="69" height="69" fill="none" stroke="#3e4e5e" stroke-width="1.5" opacity="0.6"/>
  <rect x="93"  y="8"   width="69" height="69" fill="none" stroke="#3e4e5e" stroke-width="1.5" opacity="0.6"/>
  <rect x="178" y="8"   width="70" height="69" fill="none" stroke="#3e4e5e" stroke-width="1.5" opacity="0.6"/>
  <rect x="8"   y="93"  width="69" height="69" fill="none" stroke="#3e4e5e" stroke-width="1.5" opacity="0.6"/>
  <rect x="93"  y="93"  width="69" height="69" fill="none" stroke="#3e4e5e" stroke-width="1.5" opacity="0.6"/>
  <rect x="178" y="93"  width="70" height="69" fill="none" stroke="#3e4e5e" stroke-width="1.5" opacity="0.6"/>
  <rect x="8"   y="178" width="69" height="70" fill="none" stroke="#3e4e5e" stroke-width="1.5" opacity="0.6"/>
  <rect x="93"  y="178" width="69" height="70" fill="none" stroke="#3e4e5e" stroke-width="1.5" opacity="0.6"/>
  <rect x="178" y="178" width="70" height="70" fill="none" stroke="#3e4e5e" stroke-width="1.5" opacity="0.6"/>
  <!-- Plate border/seam lines -->
  <line x1="85"  y1="0"   x2="85"  y2="256" stroke="#2a3a4a" stroke-width="2.5"/>
  <line x1="170" y1="0"   x2="170" y2="256" stroke="#2a3a4a" stroke-width="2.5"/>
  <line x1="0"   y1="85"  x2="256" y2="85"  stroke="#2a3a4a" stroke-width="2.5"/>
  <line x1="0"   y1="170" x2="256" y2="170" stroke="#2a3a4a" stroke-width="2.5"/>
  <!-- Rivets at plate corners (every intersection + edges) -->
  <!-- Top row -->
  <circle cx="85"  cy="0"   r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <circle cx="170" cy="0"   r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <circle cx="85"  cy="85"  r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <circle cx="170" cy="85"  r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <circle cx="85"  cy="170" r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <circle cx="170" cy="170" r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <circle cx="0"   cy="85"  r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <circle cx="256" cy="85"  r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <circle cx="0"   cy="170" r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <circle cx="256" cy="170" r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <circle cx="85"  cy="256" r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <circle cx="170" cy="256" r="3.5" fill="#5a6a7a" opacity="0.9"/>
  <!-- Mid-edge rivets -->
  <circle cx="42"  cy="85"  r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <circle cx="127" cy="85"  r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <circle cx="213" cy="85"  r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <circle cx="42"  cy="170" r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <circle cx="127" cy="170" r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <circle cx="213" cy="170" r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <circle cx="85"  cy="42"  r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <circle cx="85"  cy="127" r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <circle cx="85"  cy="213" r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <circle cx="170" cy="42"  r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <circle cx="170" cy="127" r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <circle cx="170" cy="213" r="2.5" fill="#5a6a7a" opacity="0.7"/>
  <!-- Subtle highlight lines on some plates -->
  <line x1="3" y1="3"  x2="82" y2="3"  stroke="#4a5a6a" stroke-width="1" opacity="0.5"/>
  <line x1="3" y1="3"  x2="3"  y2="82" stroke="#4a5a6a" stroke-width="1" opacity="0.5"/>
  <line x1="172" y1="88" x2="252" y2="88" stroke="#4a5a6a" stroke-width="1" opacity="0.5"/>
  <line x1="172" y1="88" x2="172" y2="167" stroke="#4a5a6a" stroke-width="1" opacity="0.5"/>
</svg>
