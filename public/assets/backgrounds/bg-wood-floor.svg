<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Base wood -->
  <rect width="256" height="256" fill="#8b6327"/>
  <!-- Horizontal plank strips (8 planks × 32px each) -->
  <rect x="0" y="0"   width="256" height="32" fill="#9a7230"/>
  <rect x="0" y="32"  width="256" height="32" fill="#7a5520"/>
  <rect x="0" y="64"  width="256" height="32" fill="#8b6327"/>
  <rect x="0" y="96"  width="256" height="32" fill="#9a7230"/>
  <rect x="0" y="128" width="256" height="32" fill="#7a5520"/>
  <rect x="0" y="160" width="256" height="32" fill="#8b6327"/>
  <rect x="0" y="192" width="256" height="32" fill="#9a7230"/>
  <rect x="0" y="224" width="256" height="32" fill="#7a5520"/>
  <!-- Thin gap/seam lines between planks -->
  <line x1="0" y1="32"  x2="256" y2="32"  stroke="#5a3b15" stroke-width="1.5"/>
  <line x1="0" y1="64"  x2="256" y2="64"  stroke="#5a3b15" stroke-width="1.5"/>
  <line x1="0" y1="96"  x2="256" y2="96"  stroke="#5a3b15" stroke-width="1.5"/>
  <line x1="0" y1="128" x2="256" y2="128" stroke="#5a3b15" stroke-width="1.5"/>
  <line x1="0" y1="160" x2="256" y2="160" stroke="#5a3b15" stroke-width="1.5"/>
  <line x1="0" y1="192" x2="256" y2="192" stroke="#5a3b15" stroke-width="1.5"/>
  <line x1="0" y1="224" x2="256" y2="224" stroke="#5a3b15" stroke-width="1.5"/>
  <!-- Vertical plank end joints (staggered per row) -->
  <line x1="128" y1="0"   x2="128" y2="32"  stroke="#6a4820" stroke-width="1"/>
  <line x1="64"  y1="32"  x2="64"  y2="64"  stroke="#6a4820" stroke-width="1"/>
  <line x1="192" y1="32"  x2="192" y2="64"  stroke="#6a4820" stroke-width="1"/>
  <line x1="128" y1="64"  x2="128" y2="96"  stroke="#6a4820" stroke-width="1"/>
  <line x1="64"  y1="96"  x2="64"  y2="128" stroke="#6a4820" stroke-width="1"/>
  <line x1="192" y1="96"  x2="192" y2="128" stroke="#6a4820" stroke-width="1"/>
  <line x1="128" y1="128" x2="128" y2="160" stroke="#6a4820" stroke-width="1"/>
  <line x1="64"  y1="160" x2="64"  y2="192" stroke="#6a4820" stroke-width="1"/>
  <line x1="192" y1="160" x2="192" y2="192" stroke="#6a4820" stroke-width="1"/>
  <line x1="128" y1="192" x2="128" y2="224" stroke="#6a4820" stroke-width="1"/>
  <line x1="64"  y1="224" x2="64"  y2="256" stroke="#6a4820" stroke-width="1"/>
  <line x1="192" y1="224" x2="192" y2="256" stroke="#6a4820" stroke-width="1"/>
  <!-- Grain lines (subtle horizontal) -->
  <line x1="0" y1="10"  x2="256" y2="10"  stroke="#c49a45" stroke-width="0.5" opacity="0.25"/>
  <line x1="0" y1="20"  x2="256" y2="20"  stroke="#c49a45" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="42"  x2="256" y2="42"  stroke="#c49a45" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="53"  x2="256" y2="53"  stroke="#c49a45" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="74"  x2="256" y2="74"  stroke="#c49a45" stroke-width="0.5" opacity="0.25"/>
  <line x1="0" y1="84"  x2="256" y2="84"  stroke="#c49a45" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="106" x2="256" y2="106" stroke="#c49a45" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="117" x2="256" y2="117" stroke="#c49a45" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="138" x2="256" y2="138" stroke="#c49a45" stroke-width="0.5" opacity="0.25"/>
  <line x1="0" y1="148" x2="256" y2="148" stroke="#c49a45" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="170" x2="256" y2="170" stroke="#c49a45" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="181" x2="256" y2="181" stroke="#c49a45" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="202" x2="256" y2="202" stroke="#c49a45" stroke-width="0.5" opacity="0.25"/>
  <line x1="0" y1="212" x2="256" y2="212" stroke="#c49a45" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="234" x2="256" y2="234" stroke="#c49a45" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="245" x2="256" y2="245" stroke="#c49a45" stroke-width="0.5" opacity="0.15"/>
  <!-- Wood knots -->
  <ellipse cx="40"  cy="80"  rx="7" ry="5" fill="#6d4a1a" opacity="0.7"/>
  <ellipse cx="40"  cy="80"  rx="4" ry="3" fill="#7a5520" opacity="0.5"/>
  <ellipse cx="200" cy="176" rx="8" ry="5" fill="#6d4a1a" opacity="0.7"/>
  <ellipse cx="200" cy="176" rx="4.5" ry="3" fill="#7a5520" opacity="0.5"/>
</svg>
