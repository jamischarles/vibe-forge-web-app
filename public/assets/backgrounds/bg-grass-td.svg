<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Base grass -->
  <rect width="256" height="256" fill="#4a7a3a"/>
  <!-- Grass variation patches — darker -->
  <ellipse cx="30"  cy="40"  rx="22" ry="14" fill="#3d6d30" opacity="0.6"/>
  <ellipse cx="110" cy="15"  rx="18" ry="10" fill="#3d6d30" opacity="0.5"/>
  <ellipse cx="200" cy="55"  rx="24" ry="16" fill="#3d6d30" opacity="0.6"/>
  <ellipse cx="70"  cy="115" rx="20" ry="12" fill="#2d5a20" opacity="0.55"/>
  <ellipse cx="170" cy="130" rx="26" ry="15" fill="#3d6d30" opacity="0.5"/>
  <ellipse cx="30"  cy="190" rx="20" ry="13" fill="#2d5a20" opacity="0.6"/>
  <ellipse cx="140" cy="210" rx="22" ry="14" fill="#3d6d30" opacity="0.5"/>
  <ellipse cx="230" cy="185" rx="18" ry="11" fill="#2d5a20" opacity="0.55"/>
  <!-- Grass variation patches — lighter -->
  <ellipse cx="80"  cy="70"  rx="16" ry="10" fill="#5a8a48" opacity="0.5"/>
  <ellipse cx="190" cy="95"  rx="20" ry="12" fill="#5a8a48" opacity="0.4"/>
  <ellipse cx="50"  cy="155" rx="18" ry="11" fill="#5a8a48" opacity="0.45"/>
  <ellipse cx="210" cy="240" rx="24" ry="14" fill="#5a8a48" opacity="0.5"/>
  <ellipse cx="120" cy="165" rx="14" ry="9"  fill="#5a8a48" opacity="0.4"/>
  <!-- Small individual blade tufts -->
  <circle cx="15"  cy="90"  r="4" fill="#3a6a28" opacity="0.7"/>
  <circle cx="155" cy="75"  r="3" fill="#5a8a48" opacity="0.6"/>
  <circle cx="240" cy="130" r="4" fill="#3a6a28" opacity="0.65"/>
  <circle cx="95"  cy="200" r="3" fill="#5a8a48" opacity="0.6"/>
  <circle cx="220" cy="20"  r="3" fill="#3a6a28" opacity="0.6"/>
  <circle cx="40"  cy="245" r="4" fill="#5a8a48" opacity="0.55"/>
  <!-- Tiny wildflowers -->
  <circle cx="55"  cy="35"  r="2.5" fill="#e8d44d" opacity="0.85"/>
  <circle cx="175" cy="50"  r="2"   fill="#fffde7" opacity="0.9"/>
  <circle cx="120" cy="95"  r="2.5" fill="#ff8ab0" opacity="0.8"/>
  <circle cx="240" cy="200" r="2"   fill="#e8d44d" opacity="0.8"/>
  <circle cx="20"  cy="170" r="2.5" fill="#fffde7" opacity="0.85"/>
  <circle cx="145" cy="240" r="2"   fill="#ff8ab0" opacity="0.75"/>
</svg>
